services:
  - type: web
    name: daweb-frontend
    runtime: node
    rootDir: frontend_2do_intento
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx serve dist/frontend_2do_intento/browser -s -l 4000
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://daweb-backend.onrender.com

 